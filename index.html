<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Macro Investment-Ampel</title>
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Urbanist', sans-serif; background-color: #0a0a0a; color: #f5f5f5; }
        .score-circle { width: 140px; height: 140px; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid #1a1a1a; transition: all 0.5s ease; }
        
        /* Neue, erweiterte Farbskala für die runden Haupt-Ampeln */
        .score-circle.dark-green { background-color: #00b300; box-shadow: 0 0 50px rgba(0, 179, 0, 0.4); color: #fff; }
        .score-circle.light-green { background-color: #5cd65c; box-shadow: 0 0 40px rgba(92, 214, 92, 0.3); color: #0a0a0a; }
        .score-circle.yellow { background-color: #ffcc00; box-shadow: 0 0 40px rgba(255, 204, 0, 0.3); color: #1a1a1a; }
        .score-circle.orange { background-color: #ff9900; box-shadow: 0 0 40px rgba(255, 153, 0, 0.3); color: #0a0a0a; }
        .score-circle.red { background-color: #ff4d4d; box-shadow: 0 0 50px rgba(255, 77, 77, 0.4); color: #0a0a0a; }
        .score-circle.gray { background-color: #333; color: #888; }
        
        .file-upload-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .file-upload-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-8 min-h-screen flex flex-col items-center">
    
    <div id="root" class="w-full max-w-[1400px]"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SCORING LOGIK (1 bis 10) ---
        const getTrendScore = (val) => val < -10 ? 10 : val < -5 ? 8 : val <= 5 ? 5 : val <= 10 ? 3 : 1;
        const getMacdScore = (val) => {
            if (typeof val === 'number') return val; 
            const s = String(val).toLowerCase();
            if (s.includes("kreuzt") && s.includes("oben")) return 10;
            if (s.includes("steigt steil")) return 8;
            if (s.includes("steigt flach")) return 6;
            if (s.includes("fällt leicht")) return 4;
            if (s.includes("fällt stark")) return 2;
            if (s.includes("kreuzt") && s.includes("unten")) return 1;
            return 5; 
        };
        const getYieldCurveScore = (val) => val > 1.0 ? 10 : val > 0.5 ? 8 : val > 0.1 ? 6 : val > -0.1 ? 4 : 1;
        const getDxyScore = (val) => val < -5 ? 10 : val < -2 ? 8 : val <= 2 ? 5 : val <= 5 ? 3 : 1;
        const getVixScore = (val) => val > 35 ? 10 : val > 25 ? 8 : val > 18 ? 5 : val >= 13 ? 3 : 1;
        const getCreditSpreadScore = (val) => {
            if (val > 8.0) return 10;
            if (val > 6.0) return 2; 
            if (val > 4.5) return 4; 
            if (val >= 3.5) return 6;
            return 8;                
        };
        const getRsiScore = (val) => {
            if (val < 30) return 10;
            if (val < 45) return 8;
            if (val <= 55) return 5;
            if (val < 70) return 3;
            return 1;
        };
        const getInflationScore = (val) => {
            if (val > 2.5) return 10;
            if (val > 2.2) return 8;
            if (val >= 1.8) return 5;
            if (val > 1.0) return 3;
            return 1;
        };

        // --- FARB-LOGIK FÜR DAS GLOBALE BANNER ---
        const getGlobalFgColor = (val) => {
            if (val < 25) return 'bg-[#00b300] text-white shadow-[0_0_20px_rgba(0,179,0,0.5)]'; // Starker Kauf
            if (val < 45) return 'bg-[#5cd65c] text-black shadow-[0_0_15px_rgba(92,214,92,0.3)]'; // Kauf
            if (val <= 55) return 'bg-[#ffcc00] text-black shadow-[0_0_15px_rgba(255,204,0,0.3)]'; // Neutral
            if (val < 75) return 'bg-[#ff9900] text-black shadow-[0_0_15px_rgba(255,153,0,0.3)]'; // Warnung
            return 'bg-[#ff4d4d] text-black shadow-[0_0_20px_rgba(255,77,77,0.5)]'; // Starker Verkauf
        };
        const getGlobalFgText = (val) => {
            if (val < 25) return 'text-[#00b300]';
            if (val < 45) return 'text-[#5cd65c]';
            if (val <= 55) return 'text-[#ffcc00]';
            if (val < 75) return 'text-[#ff9900]';
            return 'text-[#ff4d4d]';
        };
        const getGlobalFgLabel = (val) => {
            if (val < 25) return 'Extreme Angst (Starker Kauf)';
            if (val < 45) return 'Angst (Gutes Einstiegsumfeld)';
            if (val <= 55) return 'Neutral';
            if (val < 75) return 'Gier (Erhöhtes Risiko)';
            return 'Extreme Gier (Warnsignal)';
        };

        // --- NEUE 5-STUFIGE FARB-LOGIK FÜR DIE KACHELN ---
        const getTileColorClasses = (score) => {
            if (score >= 9) return { 
                border: 'border-t-4 border-t-[#00b300] border-[#2a2a2a]', 
                iconBg: 'bg-[#00b300]/20 text-[#00b300]', 
                badge: 'text-[#00b300] bg-[#00b300]/10' 
            };
            if (score >= 7) return { 
                border: 'border-t-4 border-t-[#5cd65c] border-[#2a2a2a]', 
                iconBg: 'bg-[#5cd65c]/20 text-[#5cd65c]', 
                badge: 'text-[#5cd65c] bg-[#5cd65c]/10' 
            };
            if (score >= 5) return { 
                border: 'border-t-4 border-t-[#ffcc00] border-[#2a2a2a]', 
                iconBg: 'bg-[#ffcc00]/20 text-[#ffcc00]', 
                badge: 'text-[#ffcc00] bg-[#ffcc00]/10' 
            };
            if (score >= 3) return { 
                border: 'border-t-4 border-t-[#ff9900] border-[#2a2a2a]', 
                iconBg: 'bg-[#ff9900]/20 text-[#ff9900]', 
                badge: 'text-[#ff9900] bg-[#ff9900]/10' 
            };
            return { 
                border: 'border-t-4 border-t-[#ff4d4d] border-[#2a2a2a]', 
                iconBg: 'bg-[#ff4d4d]/20 text-[#ff4d4d]', 
                badge: 'text-[#ff4d4d] bg-[#ff4d4d]/10' 
            };
        };

        const getIndicatorConfig = (id, value, region) => {
            if (value === null || value === undefined) return null; 
            
            let score, icon, title, unit, desc = '';
            
            switch(id) {
                case 'trend':
                    score = getTrendScore(value); icon = 'fa-chart-pie'; title = 'Bewertung (SMA)'; unit = '%';
                    desc = 'Abstand zur 200-Tage-Linie. Antizyklisch bewertet.';
                    break;
                case 'macd':
                    score = getMacdScore(value); icon = 'fa-arrow-trend-up'; title = 'Momentum (MACD)'; unit = '';
                    desc = 'Trendstärke & Timing. Bewertet Kreuzungen und die Steigung.';
                    break;
                case 'yield_curve':
                    score = getYieldCurveScore(value); icon = 'fa-chart-line'; title = 'Zinsstruktur'; unit = '%';
                    desc = '10J minus 2J bzw. 3M. Invers (< 0) warnt vor Abschwung.';
                    break;
                case 'dxy_trend':
                    score = getDxyScore(value); icon = 'fa-dollar-sign'; title = 'US-Dollar Trend'; unit = '%';
                    desc = 'Ein schwacher Dollar beflügelt EM und Rohstoffe.';
                    break;
                case 'vix':
                    score = getVixScore(value); icon = 'fa-bolt'; title = 'Volatilität'; unit = ' Pkt';
                    desc = 'Angstbarometer (VIX). Extreme Panik = Kaufchance.';
                    break;
                case 'credit_spread':
                    score = getCreditSpreadScore(value); icon = 'fa-building-columns'; title = 'Credit Spread'; unit = '%';
                    desc = 'U-Form: Niedrig = Gut, Hoch = Schlecht, Panik = Kaufchance.';
                    break;
                case 'rsi':
                    score = getRsiScore(value); icon = 'fa-scale-balanced'; title = 'Sentiment (RSI)'; unit = ' Pkt';
                    desc = 'Relative Stärke. < 30 = Überverkauft, > 70 = Überkauft.';
                    break;
                case 'gold_trend':
                    score = getTrendScore(value); icon = 'fa-coins'; title = 'Gold (SMA 200)'; unit = '%';
                    desc = 'Sicherer Hafen. Starker Trend zeigt fallende Realzinsen an.';
                    break;
                case 'copper_trend':
                    score = getTrendScore(value); icon = 'fa-microchip'; title = 'Dr. Copper (SMA 200)'; unit = '%';
                    desc = 'Konjunktur-Indikator. Kupfer hoch = wachsende Wirtschaft.';
                    break;
                case 'oil_trend':
                    score = getTrendScore(value); icon = 'fa-oil-well'; title = 'WTI Öl (SMA 200)'; unit = '%';
                    desc = 'Energie-Nachfrage. Treibt häufig die globale Inflation.';
                    break;
                case 'inflation_breakeven':
                    score = getInflationScore(value); icon = 'fa-arrow-up-right-dots'; title = 'Inflationserwartung'; unit = '%';
                    desc = 'Erwartete Inflation (10J). Gut für Rohstoffe.';
                    break;
                default: return null;
            }
            return { id, title, value, score, icon, unit, desc };
        };

        const RegionDashboard = ({ regionName, data, flagIcon, indicatorKeys }) => {
            if (!data) return null;

            const indicators = indicatorKeys.map(k => getIndicatorConfig(k, data[k], regionName)).filter(Boolean);
            
            let avgScore = 0;
            if (indicators.length > 0) {
                avgScore = indicators.reduce((acc, ind) => acc + ind.score, 0) / indicators.length;
            }
            const displayScore = avgScore.toFixed(1);
            
            // NEUE LOGIK FÜR DIE HAUPT-AMPELN
            let overallLight = 'gray', label = 'KEINE DATEN';
            if (avgScore >= 8.5) { overallLight = 'dark-green'; label = 'STARKER KAUF'; }
            else if (avgScore >= 6.5) { overallLight = 'light-green'; label = 'KAUF'; }
            else if (avgScore >= 4.5) { overallLight = 'yellow'; label = 'NEUTRAL'; }
            else if (avgScore >= 2.5) { overallLight = 'orange'; label = 'ERHÖHTES RISIKO'; }
            else if (avgScore > 0) { overallLight = 'red'; label = 'BÄRISCH'; }

            return (
                <div className="flex flex-col xl:flex-row gap-6 bg-[#0a0a0a] p-6 rounded-2xl border border-white/10 shadow-2xl relative overflow-hidden mb-6">
                    <div className="flex flex-col justify-center items-center xl:items-start xl:w-1/4 xl:border-r border-white/10 xl:pr-6 shrink-0">
                        <div className="bg-[#323232] text-[#deff9a] px-4 py-1 rounded-full text-sm font-bold tracking-wider uppercase mb-6 flex items-center gap-2">
                            <i className={`fa-solid ${flagIcon}`}></i> {regionName}
                        </div>
                        
                        <div className={`score-circle ${overallLight} mb-4`}>
                            <span className="text-5xl font-bold leading-none">{displayScore}</span>
                            <span className="text-xs font-bold tracking-widest mt-1 opacity-80">{label}</span>
                        </div>
                        <p className="text-gray-400 text-xs text-center xl:text-left mt-2">
                            Score basiert auf {indicators.length} Indikatoren.
                        </p>
                    </div>

                    <div className="xl:w-3/4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 auto-rows-max">
                        {indicators.map(ind => {
                            const colors = getTileColorClasses(ind.score);
                            return (
                                <div key={ind.id} className={`rounded-xl p-4 flex flex-col justify-between bg-[#141414] border border-b border-l border-r ${colors.border}`}>
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <div>
                                                <p className="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">{ind.title}</p>
                                                <p className="text-xl font-bold text-white">
                                                    {typeof ind.value === 'number' && ind.value > 0 && ind.unit === '%' ? '+' : ''}{ind.value}
                                                    <span className="text-xs text-gray-500 font-normal ml-1">{ind.unit}</span>
                                                </p>
                                            </div>
                                            <div className={`w-8 h-8 rounded-md flex items-center justify-center shrink-0 ${colors.iconBg}`}>
                                                <i className={`fa-solid ${ind.icon} text-sm`}></i>
                                            </div>
                                        </div>
                                        <p className="text-[11px] text-gray-500 mb-3 line-clamp-2 leading-tight">{ind.desc}</p>
                                    </div>
                                    <div className="flex justify-end border-t border-[#2a2a2a] pt-2 mt-auto">
                                        <span className={`px-2 py-0.5 rounded text-xs font-bold ${colors.badge}`}>{ind.score}/10</span>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [dashboardData, setDashboardData] = useState(null);

            useEffect(() => {
                fetch('dashboard_data.json')
                    .then(response => {
                        if (!response.ok) throw new Error("JSON not found");
                        return response.json();
                    })
                    .then(data => setDashboardData(data))
                    .catch(err => console.log("Lokalmodus: Bitte lade die Datei manuell hoch."));
            }, []);

            const handleFileUpload = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try { setDashboardData(JSON.parse(e.target.result)); } catch (err) { alert("Ungültige JSON"); }
                };
                reader.readAsText(file);
            };

            const standardKeys = ['trend', 'macd', 'yield_curve', 'dxy_trend', 'vix', 'credit_spread', 'rsi'];
            const commodityKeys = ['gold_trend', 'copper_trend', 'oil_trend', 'inflation_breakeven', 'dxy_trend', 'macd', 'rsi'];

            return (
                <div className="w-full">
                    {/* Header */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
                        <div>
                            <h1 className="text-3xl md:text-5xl font-bold mb-2">Global <span className="text-[#deff9a]">Macro</span><br/>Investment-Ampel</h1>
                        </div>
                        <div className="file-upload-wrapper bg-[#2a2a2a] hover:bg-[#333] transition-colors text-white px-6 py-3 rounded-lg font-bold shadow-lg border border-gray-700 cursor-pointer">
                            <i className="fa-solid fa-file-import mr-2"></i> Update laden
                            <input type="file" accept=".json" onChange={handleFileUpload} />
                        </div>
                    </div>

                    {!dashboardData && (
                        <div className="bg-[#141414] border border-[#2a2a2a] rounded-2xl p-20 text-center flex flex-col items-center">
                            <i className="fa-solid fa-earth-americas text-6xl text-gray-700 mb-6"></i>
                            <h3 className="text-2xl font-bold text-gray-400 mb-2">Bereit für globale Daten</h3>
                        </div>
                    )}

                    {dashboardData && (
                        <div className="animate-fade-in space-y-4">
                            
                            {/* GLOBAL FEAR & GREED BANNER */}
                            <div className="flex flex-col md:flex-row justify-between items-end mb-4 gap-4">
                                {dashboardData.global_fear_greed !== undefined && dashboardData.global_fear_greed !== null && (
                                    <div className="bg-[#141414] border border-[#2a2a2a] rounded-xl px-6 py-4 flex items-center gap-5 w-full md:w-auto">
                                        <div className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl font-bold shrink-0 ${getGlobalFgColor(dashboardData.global_fear_greed)}`}>
                                            <i className="fa-solid fa-earth-americas"></i>
                                        </div>
                                        <div>
                                            <p className="text-gray-400 text-[10px] font-bold uppercase tracking-wider mb-1">Globales Marktklima (CNN)</p>
                                            <p className="text-2xl font-bold text-white leading-none">
                                                <span className={getGlobalFgText(dashboardData.global_fear_greed)}>{dashboardData.global_fear_greed}</span>
                                                <span className="text-sm font-normal text-gray-500 ml-2">({getGlobalFgLabel(dashboardData.global_fear_greed)})</span>
                                            </p>
                                        </div>
                                    </div>
                                )}
                                
                                <div className="text-right text-xs text-gray-500 font-medium pb-2 w-full md:w-auto">
                                    <i className="fa-regular fa-clock mr-1"></i> Datenstand: {dashboardData.last_updated}
                                </div>
                            </div>
                            
                            {/* Regionale Dashboards */}
                            <RegionDashboard regionName="USA" data={dashboardData.usa} flagIcon="fa-flag-usa" indicatorKeys={standardKeys} />
                            <RegionDashboard regionName="Europa" data={dashboardData.eu} flagIcon="fa-earth-europe" indicatorKeys={standardKeys} />
                            <RegionDashboard regionName="Japan" data={dashboardData.japan} flagIcon="fa-torii-gate" indicatorKeys={standardKeys} />
                            <RegionDashboard regionName="EM (ex China)" data={dashboardData.em} flagIcon="fa-globe" indicatorKeys={standardKeys} />
                            
                            {/* Rohstoff Dashboard */}
                            <RegionDashboard regionName="Rohstoffe (ex Agrar)" data={dashboardData.commodities} flagIcon="fa-gem" indicatorKeys={commodityKeys} />
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
